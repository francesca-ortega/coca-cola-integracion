<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo Interactivo: Tamaño de la Empresa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --transaction: #e67e22;
            --coordination: #e74c3c;
            --total: #2980b9;
            --bg: #f8f9fa;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 900px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        .header {
            grid-column: 1 / -1;
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 10px;
        }
        .header h1 { margin: 0; color: var(--primary); }
        .header p { color: #666; font-size: 0.95rem; }
        
        .controls-panel {
            background: #f4f6f8;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
        }
        .control-group label {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        input[type=range] { width: 100%; cursor: pointer; }
        
        .btn-optimo {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }
        .btn-optimo:hover { background-color: #1a252f; }

        .dashboard {
            display: flex;
            flex-direction: column;
        }
        .metrics {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .metric-card {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: white;
        }
        .metric-card span { display: block; font-size: 1.5rem; margin-top: 5px; }
        .ct-card { background-color: var(--transaction); }
        .cc-card { background-color: var(--coordination); }
        .total-card { background-color: var(--total); }
        
        canvas {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
        }
        
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Punto Óptimo de Integración Vertical (I*)</h1>
        <p>Ajusta las variables del mercado y la empresa para ver cómo se desplaza el tamaño óptimo (Coase & Williamson).</p>
    </div>

    <div class="controls-panel">
        <div class="control-group">
            <label>Nivel de Integración: <span id="valIntegracion">50%</span></label>
            <input type="range" id="slideIntegracion" min="5" max="95" value="50">
        </div>
        
        <hr style="width: 100%; border: 0; border-top: 1px solid #ddd;">

        <div class="control-group">
            <label style="color: var(--transaction);">Fricción del Mercado (Complejidad): <span id="valMercado">Media</span></label>
            <input type="range" id="slideMercado" min="2000" max="10000" value="5000" step="500">
            <small style="font-size: 0.75rem; color: #7f8c8d; margin-top: 4px;">↑ Aumenta Costos de Transacción</small>
        </div>

        <div class="control-group">
            <label style="color: var(--coordination);">Burocracia Interna (Ineficiencia): <span id="valBurocracia">Media</span></label>
            <input type="range" id="slideBurocracia" min="0.01" max="0.06" value="0.025" step="0.005">
            <small style="font-size: 0.75rem; color: #7f8c8d; margin-top: 4px;">↑ Aumenta Costos de Coordinación</small>
        </div>

        <button class="btn-optimo" id="btnEncontrar">Encontrar Tamaño Óptimo (I*)</button>
    </div>

    <div class="dashboard">
        <div class="metrics">
            <div class="metric-card ct-card">Transacción<span id="txtCT">0</span></div>
            <div class="metric-card cc-card">Coordinación<span id="txtCC">0</span></div>
            <div class="metric-card total-card">Costo Total<span id="txtTotal">0</span></div>
        </div>
        <canvas id="costChart"></canvas>
    </div>
</div>

<script>
    // Variables globales de los multiplicadores
    let multTransaccion = 5000;
    let multCoordinacion = 0.025;
    let dataSets = { x: [], ct: [], cc: [], total: [] };

    // Elementos del DOM
    const slideIntegracion = document.getElementById('slideIntegracion');
    const slideMercado = document.getElementById('slideMercado');
    const slideBurocracia = document.getElementById('slideBurocracia');
    const valIntegracion = document.getElementById('valIntegracion');
    const txtCT = document.getElementById('txtCT');
    const txtCC = document.getElementById('txtCC');
    const txtTotal = document.getElementById('txtTotal');

    // Función para generar los datos matemáticos
    function recalcularCurvas() {
        dataSets = { x: [], ct: [], cc: [], total: [] };
        for (let i = 5; i <= 100; i++) {
            dataSets.x.push(i);
            let ct = multTransaccion / i;
            let cc = Math.pow(i, 2) * multCoordinacion;
            dataSets.ct.push(ct);
            dataSets.cc.push(cc);
            dataSets.total.push(ct + cc);
        }
    }

    recalcularCurvas();

    // Configuración del gráfico
    const ctx = document.getElementById('costChart').getContext('2d');
    const costChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: dataSets.x,
            datasets: [
                { label: 'C. Transacción', data: dataSets.ct, borderColor: '#e67e22', borderWidth: 3, pointRadius: 0, tension: 0.4 },
                { label: 'C. Coordinación', data: dataSets.cc, borderColor: '#e74c3c', borderWidth: 3, pointRadius: 0, tension: 0.4 },
                { label: 'Costo Total', data: dataSets.total, borderColor: '#2980b9', borderWidth: 4, pointRadius: 0, tension: 0.4 }
            ]
        },
        options: {
            responsive: true,
            animation: { duration: 400 },
            plugins: { tooltip: { enabled: false }, legend: { position: 'bottom' } },
            scales: {
                x: { title: { display: true, text: 'Grado de Integración Vertical (%)', font: { weight: 'bold' } } },
                y: { title: { display: true, text: 'Nivel de Costos', font: { weight: 'bold' } }, ticks: { display: false } }
            }
        }
    });

    // Plugin para dibujar la línea vertical interactiva
    const verticalLinePlugin = {
        id: 'verticalLine',
        afterDraw: (chart) => {
            if (chart.tooltip._active && chart.tooltip._active.length) {
                const activePoint = chart.tooltip._active[0];
                const ctx = chart.ctx;
                const x = activePoint.element.x;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, chart.scales.y.top);
                ctx.lineTo(x, chart.scales.y.bottom);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#2c3e50';
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.restore();
            }
        }
    };
    Chart.register(verticalLinePlugin);

    // Actualiza el gráfico y los números en pantalla
    function actualizarVisualizacion(integracionVal) {
        valIntegracion.innerText = integracionVal + '%';
        const index = integracionVal - 5;
        
        txtCT.innerText = dataSets.ct[index].toFixed(0);
        txtCC.innerText = dataSets.cc[index].toFixed(0);
        txtTotal.innerText = dataSets.total[index].toFixed(0);

        costChart.data.datasets[0].data = dataSets.ct;
        costChart.data.datasets[1].data = dataSets.cc;
        costChart.data.datasets[2].data = dataSets.total;

        const meta0 = costChart.getDatasetMeta(0);
        costChart.tooltip.setActiveElements([
            { datasetIndex: 0, index: index },
            { datasetIndex: 1, index: index },
            { datasetIndex: 2, index: index }
        ], { x: meta0.data[index].x, y: meta0.data[index].y });
        
        costChart.update();
    }

    // Eventos de los sliders
    slideIntegracion.addEventListener('input', (e) => actualizarVisualizacion(e.target.value));
    
    slideMercado.addEventListener('input', (e) => {
        multTransaccion = e.target.value;
        let label = multTransaccion < 4000 ? "Baja" : (multTransaccion > 7000 ? "Alta" : "Media");
        document.getElementById('valMercado').innerText = label;
        recalcularCurvas();
        actualizarVisualizacion(slideIntegracion.value);
    });

    slideBurocracia.addEventListener('input', (e) => {
        multCoordinacion = e.target.value;
        let label = multCoordinacion < 0.02 ? "Baja" : (multCoordinacion > 0.04 ? "Alta" : "Media");
        document.getElementById('valBurocracia').innerText = label;
        recalcularCurvas();
        actualizarVisualizacion(slideIntegracion.value);
    });

    // Algoritmo para encontrar el punto óptimo (mínimo costo total)
    document.getElementById('btnEncontrar').addEventListener('click', () => {
        let minCosto = Infinity;
        let optimoX = 50;
        for(let i=0; i < dataSets.total.length; i++) {
            if(dataSets.total[i] < minCosto) {
                minCosto = dataSets.total[i];
                optimoX = dataSets.x[i];
            }
        }
        slideIntegracion.value = optimoX;
        actualizarVisualizacion(optimoX);
    });

    // Iniciar
    actualizarVisualizacion(slideIntegracion.value);

</script>
</body>
</html>
