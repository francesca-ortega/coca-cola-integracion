<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Estratégico: Naturaleza y Tamaño de la Firma</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2c3e50;
            --transaction: #e67e22;
            --coordination: #e74c3c;
            --total: #2980b9;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 25px;
        }
        .header {
            grid-column: 1 / -1;
            text-align: center;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .header h1 { margin: 0; color: var(--primary); font-size: 1.6rem; }
        .header p { color: #666; font-size: 0.95rem; margin-top: 5px; }
        
        .panel-controles {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #e1e4e8;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        label { font-weight: bold; font-size: 0.85rem; color: var(--primary); }
        select, input[type="range"] {
            width: 100%;
            padding: 6px;
            border-radius: 5px;
            border: 1px solid #ccc;
            cursor: pointer;
        }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #444;
        }
        .toggle-group input { width: auto; cursor: pointer; transform: scale(1.1); }
        
        .btn-optimizar {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            margin-top: 5px;
        }
        .btn-optimizar:hover { background-color: #1a252f; }
        .btn-optimizar:active { transform: scale(0.98); }

        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .metricas {
            display: flex;
            gap: 10px;
        }
        .tarjeta-metrica {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.85rem;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .tarjeta-metrica span { display: block; font-size: 1.4rem; margin-top: 5px; }
        .bg-transaccion { background-color: var(--transaction); }
        .bg-coordinacion { background-color: var(--coordination); }
        .bg-total { background-color: var(--total); }
        
        .caja-analisis {
            background: #e8f4fd;
            border-left: 5px solid var(--total);
            padding: 12px;
            border-radius: 4px;
            font-size: 0.9rem;
            color: #2c3e50;
            min-height: 60px;
            display: flex;
            align-items: center;
        }

        .contenedor-grafico {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            height: 200px; /* Altura ajustada exactamente a 200px */
            position: relative;
        }
        
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Simulador Estratégico: Naturaleza y Tamaño de la Firma</h1>
        <p>Ajusta los parámetros teóricos para explorar cómo determinan el punto óptimo de integración vertical.</p>
    </div>

    <div class="panel-controles">
        <div class="control-group">
            <label for="escenarioMacro">Escenario Macroecónomico:</label>
            <select id="escenarioMacro">
                <option value="base">Escenario Base (Normal)</option>
                <option value="crisis">Crisis de Suministro (Alta Incertidumbre)</option>
                <option value="innovacion">Revolución Tecnológica (Baja Burocracia)</option>
            </select>
        </div>

        <hr style="border: 0; border-top: 1px solid #ddd; width: 100%;">

        <div class="control-group">
            <label>Teoría de Williamson (Gobernanza):</label>
            <div class="toggle-group">
                <input type="checkbox" id="checkActivos">
                <label for="checkActivos" style="font-weight: normal; color: inherit;">Alta Especificidad de Activos</label>
            </div>
            <div class="toggle-group">
                <input type="checkbox" id="checkOportunismo">
                <label for="checkOportunismo" style="font-weight: normal; color: inherit;">Alto Riesgo de Oportunismo (Hold-up)</label>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid #ddd; width: 100%;">

        <div class="control-group">
            <label for="slideIntegracion">Grado de Integración Actual: <span id="valIntegracion">50</span>%</label>
            <input type="range" id="slideIntegracion" min="5" max="95" value="50" step="1">
        </div>

        <button class="btn-optimizar" id="btnOptimizar">Encontrar Tamaño Óptimo (I*)</button>
    </div>

    <div class="dashboard">
        <div class="metricas">
            <div class="tarjeta-metrica bg-transaccion">Costo Transacción<span id="txtCT">0</span></div>
            <div class="tarjeta-metrica bg-coordinacion">Costo Coordinación<span id="txtCC">0</span></div>
            <div class="tarjeta-metrica bg-total">Costo Total<span id="txtTotal">0</span></div>
        </div>
        
        <div class="caja-analisis" id="cajaAnalisis">
            Mueve el deslizador para analizar el estado de la empresa.
        </div>

        <div class="contenedor-grafico">
            <canvas id="graficoCostos"></canvas>
        </div>
    </div>
</div>

<script>
    // Variables globales
