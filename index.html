<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Integración Vertical en Coca-Cola</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      text-align: center;
      margin: 40px;
    }
    h1 {
      color: #c00;
    }
    #info {
      margin-top: 20px;
      font-size: 1.1em;
      color: #333;
      min-height: 60px;
    }
    canvas {
      max-width: 800px;
      margin: auto;
    }
    .botones {
      margin: 20px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .atras { background-color: #0077b6; color: white; }
    .adelante { background-color: #ff8800; color: white; }
    .reset { background-color: #555; color: white; }
  </style>
</head>
<body>
  <h1>Integración Vertical en Coca-Cola</h1>
  <p>Explora cómo Coca-Cola integra hacia atrás (insumos) y hacia adelante (distribución/marketing).</p>
  
  <div class="botones">
    <button class="atras" onclick="mostrarAtras()">Integración hacia atrás</button>
    <button class="adelante" onclick="mostrarAdelante()">Integración hacia adelante</button>
    <button class="reset" onclick="reset()">Ver modelo general</button>
  </div>
  
  <div id="info"></div>
  
  <canvas id="grafico"></canvas>

  <script>
    const ctx = document.getElementById('grafico').getContext('2d');
    const niveles = Array.from({length: 11}, (_, i) => i);

    // Modelo general
    const costosTransaccion = niveles.map(x => 10 - x); 
    const costosCoordinacion = niveles.map(x => x);     
    const costosTotales = niveles.map((x, i) => costosTransaccion[i] + costosCoordinacion[i]);

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: niveles,
        datasets: [
          {
            label: 'Costos de Transacción',
            data: costosTransaccion,
            borderColor: 'blue',
            fill: false
          },
          {
            label: 'Costos de Coordinación',
            data: costosCoordinacion,
            borderColor: 'green',
            fill: false
          },
          {
            label: 'Costo Total',
            data: costosTotales,
            borderColor: 'red',
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          title: {
            display: true,
            text: 'Modelo general de integración vertical'
          }
        }
      }
    });

    const info = document.getElementById('info');

    function mostrarAtras() {
      info.innerHTML = "🔵 Integración hacia atrás: Coca-Cola asegura insumos críticos como concentrados, azúcar y agua. Esto reduce riesgos de fallas en materias primas y garantiza calidad homogénea.";
      chart.options.plugins.title.text = "Integración hacia atrás - Insumos";
      chart.update();
    }

    function mostrarAdelante() {
      info.innerHTML = "🟠 Integración hacia adelante: Coca-Cola controla distribución, marketing global y contratos exclusivos con restaurantes y supermercados. Esto fortalece su presencia en el mercado.";
      chart.options.plugins.title.text = "Integración hacia adelante - Distribución y marketing";
      chart.update();
    }

    function reset() {
      info.innerHTML = "⚖️ Modelo general: el punto óptimo de integración se alcanza cuando el costo de organizar dentro = costo de comprar fuera.";
      chart.options.plugins.title.text = "Modelo general de integración vertical";
      chart.update();
    }

    reset(); // inicial
  </script>
</body>
</html>
